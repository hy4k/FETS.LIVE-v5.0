name: CMA Seat Availability Scraper

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (midnight, 6am, noon, 6pm UTC)
  workflow_dispatch:          # lets you trigger it manually from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright @supabase/supabase-js dotenv

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run scraper
        run: node scripts/scrape-prometric.js
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Log completion
        run: echo "CMA scrape completed at $(date)"
