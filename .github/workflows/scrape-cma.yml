name: CMA Seat Availability Scraper

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'   # 4× daily at 2am, 8am, 2pm, 8pm UTC (IST +5:30)
  workflow_dispatch:               # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright @supabase/supabase-js dotenv

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Inject saved session cookie so CAPTCHA is not re-triggered
      # Set this secret: Settings → Secrets → PROMETRIC_SESSION_JSON
      # Value: the contents of .prometric-session.json from a local --headless=false run
      - name: Restore Prometric session cookie
        if: ${{ secrets.PROMETRIC_SESSION_JSON != '' }}
        run: echo '${{ secrets.PROMETRIC_SESSION_JSON }}' > .prometric-session.json

      - name: Run scraper
        run: node scripts/scrape-prometric.js
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Log completion
        run: echo "CMA scrape completed at $(date)"
